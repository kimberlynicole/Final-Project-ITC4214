{% extends "accounts/layout.html" %}

{% block title %}Register - E-Book Store{% endblock %}

{% block body %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">E-Book Store</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="card-title mb-3 text-center">Create Account</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100">Register</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
