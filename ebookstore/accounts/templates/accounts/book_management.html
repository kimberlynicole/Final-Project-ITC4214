{% for book in books %}

<div class="d-flex justify-content-between align-items-center border-bottom py-2">

    <div>
        <strong>{{ book.title }}</strong><br>
        <small>{{ book.author }} • €{{ book.price }}</small>
    </div>

    <div class="d-flex gap-2">

        <!-- EDIT -->
        <a href="{% url 'accounts:edit_book' book.id %}" class="btn btn-sm btn-primary">
            <i class="bi bi-pencil-square"></i>
        </a>

        <!-- DELETE BUTTON (JS TRIGGER) -->
        <button
            class="btn btn-sm btn-danger js-delete-book"
            data-url="{% url 'accounts:delete_book' book.id %}">
            <i class="bi bi-trash"></i>
        </button>

    </div>

</div>

{% empty %}
    <p>No books found</p>
{% endfor %}
