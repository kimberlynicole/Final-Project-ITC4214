<div class="mt-4 p-4 bg-light rounded d-flex justify-content-between align-items-center shadow-sm">

  <h5 class="mb-0">Total: €{{ total }}</h5>

  {% if user.is_authenticated %}
    <a href="{% url 'cart:checkout' %}" class="btn btn-primary">
      Checkout
    </a>
  {% else %}
    <a href="{% url 'accounts:login' %}" class="btn btn-secondary">
      Login to Checkout
    </a>
  {% endif %}

</div>
