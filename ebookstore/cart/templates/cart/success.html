{% extends 'books/layout.html' %}
{% block body %}

<div class="text-center py-5">

    <i class="bi bi-check-circle-fill text-success display-1"></i>

    <h2 class="fw-bold mt-3">Payment Successful!</h2>

    <p class="text-muted">
        Your books have been added to your library.
    </p>

    <div class="mt-4">

        <!-- CONTINUE SHOPPING -->
        <a href="{% url 'books:books' %}" class="btn btn-primary btn-lg me-2">
            Continue Shopping
        </a>

        <!-- GO TO LIBRARY -->
        <a href="{% url 'library:my_library' %}" class="btn btn-success btn-lg">
            Go to My Library
        </a>

    </div>

</div>

{% endblock %}
