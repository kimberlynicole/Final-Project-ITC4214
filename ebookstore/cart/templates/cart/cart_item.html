<div class="list-group-item cart-item d-flex justify-content-between align-items-center py-3">

  <!-- REMOVE ICON (TOP RIGHT) -->
  <a href="{% url 'cart:remove_from_cart' item.book.id %}"
    class="cart-remove-icon text-danger fs-5"
    title="Remove item">
      <i class="bi bi-trash"></i>
  </a>

  <!-- LEFT SIDE -->
  <div class="d-flex align-items-center">

    <img src="{{ item.book.cover.url }}"
         class="rounded me-3 cart-cover">

    <div>
      <h6 class="mb-1">{{ item.book.title }}</h6>
      <small class="text-muted">{{ item.book.author }}</small>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="text-end fw-bold">
    <h5>€{{ item.book.price }}</h5>
  </div>

</div>
