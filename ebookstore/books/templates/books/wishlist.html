{% extends 'books/layout.html' %}

{% block body %}

<h2>My Wishlist ❤️</h2>

<div class="row">
  {% for item in wishlist_items %}
  <div class="col-md-3">
    <div class="card mb-3 p-2">

      <img src="{{ item.book.cover.url }}" class="img-fluid">

      <h5>{{ item.book.title }}</h5>
      <p>{{ item.book.author }}</p>

      <a href="{% url 'book_detail' item.book.id %}" class="btn btn-primary btn-sm">
        View
      </a>

      <a href="{% url 'remove_from_wishlist' item.book.id %}" class="btn btn-danger btn-sm mt-1">
        Remove ❌
      </a>

    </div>
  </div>
  {% empty %}
    <p>No items in wishlist.</p>
  {% endfor %}
</div>

{% endblock %}
