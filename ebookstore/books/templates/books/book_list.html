{% extends 'books/layout.html' %}

{% block content %}

<h2>Books</h2>

<div class="row">
    {% for book in books %}
    <div class="col-md-3">
        <div class="card mb-3">

            <img src="{{ book.cover.url }}" class="card-img-top">

            <div class="card-body">
                <h5>{{ book.title }}</h5>
                <p>{{ book.author }}</p>
                <p>${{ book.price }}</p>

                <a href="{% url 'book_detail' book.id %}" class="btn btn-primary">
                    View Details
                </a>
            </div>

        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
