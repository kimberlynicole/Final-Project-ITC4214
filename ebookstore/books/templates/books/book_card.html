<a href="{% url 'books:book_detail' book.id %}" class="text-decoration-none text-dark">

  <div class="card me-3 text-center book-card" style="min-width:200px;">

    {% if book.cover %}
      <img src="{{ book.cover.url }}" class="card-img-top" style="height:250px; object-fit:cover;">
    {% endif %}

    <div class="card-body">

      <!-- ⭐ RATING (FROM MODEL) -->
      <div class="mb-2">
        {% include 'books/star_display.html' with rating=book.average_rating show_avg=True %}
      </div>

      <!-- TITLE -->
      <h6 class="mb-1">{{ book.title }}</h6>

      <!-- AUTHOR -->
      <p class="text-muted mb-1">{{ book.author }}</p>

      <!-- PRICE -->
      <p class="text-success fw-bold">€{{ book.price }}</p>

    </div>

  </div>

</a>
